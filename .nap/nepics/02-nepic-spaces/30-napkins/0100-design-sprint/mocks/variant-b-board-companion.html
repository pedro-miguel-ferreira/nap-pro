<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAP v2 — Variant B: Board View + Terminal</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: Menlo, Monaco, 'Courier New', monospace;
    font-size: 14px;
    background: #1e1e1e;
    color: #cccccc;
    height: 100vh;
    overflow: hidden;
  }
  .layout { display: flex; height: 100%; }

  /* ─── Gutter ─── */
  .gutter {
    width: 60px;
    flex-shrink: 0;
    background: #1e1e1e;
    border-right: 1px solid #3c3c3c;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 12px;
    gap: 4px;
  }
  .nepic-icon {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    background: #2a2d2e;
    color: #808080;
    transition: background 0.15s, color 0.15s;
  }
  .nepic-icon:hover { background: #37373d; color: #cccccc; }
  .nepic-icon.active {
    background: #37373d;
    color: #ffffff;
    outline: 2px solid #007acc;
    outline-offset: -2px;
  }
  .gutter-spacer { flex: 1; }
  .nepic-icon.add { font-size: 22px; font-weight: 300; color: #555; }
  .nepic-icon.add:hover { color: #cccccc; }

  /* ─── Middle column: Board ─── */
  .middle {
    flex: 1;
    background: #252526;
    border-right: 1px solid #3c3c3c;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }
  .board-header {
    padding: 8px 12px;
    border-bottom: 1px solid #3c3c3c;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .board-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #808080;
  }
  .architect-pill {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 8px;
    border-radius: 3px;
    background: #2a2d2e;
    cursor: pointer;
    transition: background 0.15s;
  }
  .architect-pill:hover { background: #37373d; }
  .architect-pill.selected { background: #37373d; outline: 1px solid #007acc; }

  .board-body {
    flex: 1;
    display: flex;
    gap: 1px;
    background: #3c3c3c;
    overflow-x: auto;
  }
  .board-body::-webkit-scrollbar { height: 6px; }
  .board-body::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }

  /* Kanban columns */
  .kanban-col {
    flex: 1;
    min-width: 130px;
    background: #252526;
    display: flex;
    flex-direction: column;
  }
  .kanban-col-header {
    padding: 8px 10px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #808080;
    border-bottom: 1px solid #3c3c3c;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .col-count {
    font-size: 9px;
    background: #3c3c3c;
    color: #808080;
    padding: 1px 5px;
    border-radius: 8px;
  }
  .kanban-col-body {
    flex: 1;
    padding: 6px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .kanban-col-body::-webkit-scrollbar { width: 4px; }
  .kanban-col-body::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }

  /* Cards */
  .kanban-card {
    background: #2a2d2e;
    border: 1px solid #3c3c3c;
    border-radius: 4px;
    padding: 8px 10px;
    cursor: pointer;
    transition: background 0.1s, border-color 0.15s;
  }
  .kanban-card:hover { background: #37373d; border-color: #555; }
  .kanban-card.selected { border-color: #007acc; background: #37373d; }
  .card-name {
    font-size: 12px;
    color: #cccccc;
    margin-bottom: 6px;
    line-height: 1.3;
  }
  .card-agents {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .card-agents-label {
    font-size: 10px;
    color: #555;
    margin-right: 2px;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-running { background: #22c55e; }
  .dot-done { background: #3b82f6; }
  .dot-exited { background: #6b7280; }
  .card-no-agents {
    font-size: 10px;
    color: #555;
  }

  /* ─── Terminal panel ─── */
  .terminal-panel {
    width: 480px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: #1e1e1e;
  }
  .terminal-header {
    padding: 8px 16px;
    border-bottom: 1px solid #3c3c3c;
    display: flex;
    align-items: center;
    gap: 8px;
    background: #252526;
    flex-shrink: 0;
  }
  .terminal-header-name { font-size: 13px; color: #cccccc; }
  .terminal-header-label {
    font-size: 10px;
    color: #808080;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .terminal-body {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
    font-size: 13px;
    line-height: 1.6;
  }
  .terminal-body::-webkit-scrollbar { width: 6px; }
  .terminal-body::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }

  .t-dim { color: #555; }
  .t-green { color: #22c55e; }
  .t-blue { color: #3b82f6; }
  .t-yellow { color: #e5c07b; }
  .t-cyan { color: #56b6c2; }
  .t-white { color: #cccccc; }
  .t-gray { color: #808080; }
  .t-bold { font-weight: 700; }
  .t-tool {
    background: #2a2d2e;
    border-left: 2px solid #3b82f6;
    padding: 4px 8px;
    margin: 4px 0;
    display: block;
  }
  .t-thinking {
    background: #2a2d2e;
    border-left: 2px solid #e5c07b;
    padding: 4px 8px;
    margin: 4px 0;
    display: block;
    color: #808080;
    font-style: italic;
  }
  .cursor-block {
    display: inline-block;
    width: 8px;
    height: 14px;
    background: #cccccc;
    animation: blink 1s step-end infinite;
    vertical-align: text-bottom;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Status badges */
  .status-badge {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    text-transform: uppercase;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .badge-doing { background: #22c55e33; color: #22c55e; }
  .badge-todo { background: #3b82f633; color: #3b82f6; }
  .badge-backlog { background: #6b728033; color: #9ca3af; }
  .badge-draft { background: #3c3c3c; color: #808080; }
  .badge-done { background: #3b82f633; color: #3b82f6; }
</style>
</head>
<body>
<div class="layout">
  <!-- Gutter -->
  <div class="gutter">
    <div class="nepic-icon" onclick="selectNepic(this)" title="poc">P</div>
    <div class="nepic-icon active" onclick="selectNepic(this)" title="spaces">S</div>
    <div class="gutter-spacer"></div>
    <div class="nepic-icon add" onclick="selectNepic(this)" title="create">+</div>
  </div>

  <!-- Middle column: Board view -->
  <div class="middle">
    <div class="board-header">
      <span class="board-title">Board</span>
      <div class="architect-pill selected" id="architect-pill" onclick="selectAgent('architect', 'Architect', 'running')">
        <div class="status-dot dot-running" style="width:6px;height:6px"></div>
        <span style="font-size:11px;color:#cccccc">Architect</span>
        <span class="status-badge badge-doing" style="font-size:9px">running</span>
      </div>
    </div>

    <div class="board-body">
      <!-- Draft -->
      <div class="kanban-col">
        <div class="kanban-col-header">draft <span class="col-count">1</span></div>
        <div class="kanban-col-body">
          <div class="kanban-card" onclick="selectCard(this, null)">
            <div class="card-name">0400-session-continuity</div>
            <div class="card-no-agents">no agents</div>
          </div>
        </div>
      </div>

      <!-- Backlog -->
      <div class="kanban-col">
        <div class="kanban-col-header">backlog <span class="col-count">1</span></div>
        <div class="kanban-col-body">
          <div class="kanban-card" onclick="selectCard(this, null)">
            <div class="card-name">0300-napkin-browser</div>
            <div class="card-no-agents">no agents</div>
          </div>
        </div>
      </div>

      <!-- Todo -->
      <div class="kanban-col">
        <div class="kanban-col-header">todo <span class="col-count">1</span></div>
        <div class="kanban-col-body">
          <div class="kanban-card" onclick="selectCard(this, null)">
            <div class="card-name">0200-sqlite-persistence</div>
            <div class="card-no-agents">no agents</div>
          </div>
        </div>
      </div>

      <!-- Doing -->
      <div class="kanban-col">
        <div class="kanban-col-header">doing <span class="col-count">1</span></div>
        <div class="kanban-col-body">
          <div class="kanban-card selected" onclick="selectCard(this, '001-fs-eng')" data-default-agent="001-fs-eng" data-default-name="001-fs-eng-design-sprint" data-default-status="running">
            <div class="card-name">0100-design-sprint</div>
            <div class="card-agents">
              <span class="card-agents-label">agents</span>
              <div class="status-dot dot-running" title="001-fs-eng-design-sprint: running" onclick="event.stopPropagation(); selectAgent('001-fs-eng', '001-fs-eng-design-sprint', 'running')"></div>
              <div class="status-dot dot-done" title="002-test-arch-sqlite: done" onclick="event.stopPropagation(); selectAgent('002-test-arch', '002-test-arch-sqlite', 'done')"></div>
              <div class="status-dot dot-exited" title="003-fs-eng-sqlite-fix: exited" onclick="event.stopPropagation(); selectAgent('003-fs-eng-fix', '003-fs-eng-sqlite-fix', 'exited')"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Review -->
      <div class="kanban-col">
        <div class="kanban-col-header">review <span class="col-count">0</span></div>
        <div class="kanban-col-body"></div>
      </div>

      <!-- Done -->
      <div class="kanban-col">
        <div class="kanban-col-header">done <span class="col-count">1</span></div>
        <div class="kanban-col-body">
          <div class="kanban-card" onclick="selectCard(this, 'a-lifecycle-1')" data-default-agent="a-lifecycle-1" data-default-name="001-fs-eng-lifecycle" data-default-status="done">
            <div class="card-name">0500-agent-lifecycle</div>
            <div class="card-agents">
              <span class="card-agents-label">agents</span>
              <div class="status-dot dot-done" title="001-fs-eng-lifecycle: done" onclick="event.stopPropagation(); selectAgent('a-lifecycle-1', '001-fs-eng-lifecycle', 'done')"></div>
              <div class="status-dot dot-done" title="002-test-eng-lifecycle: done" onclick="event.stopPropagation(); selectAgent('a-lifecycle-2', '002-test-eng-lifecycle', 'done')"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Terminal -->
  <div class="terminal-panel">
    <div class="terminal-header">
      <div class="status-dot dot-running" id="term-dot"></div>
      <span class="terminal-header-name" id="term-name">001-fs-eng-design-sprint</span>
      <span style="flex:1"></span>
      <span class="terminal-header-label" id="term-status">running</span>
    </div>
    <div class="terminal-body" id="term-body">
    </div>
  </div>
</div>

function selectNepic(el) {
  document.querySelectorAll('.nepic-icon').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
}

function selectCard(cardEl, agentId) {
  document.querySelectorAll('.kanban-card').forEach(c => c.classList.remove('selected'));
  cardEl.classList.add('selected');
  // Deselect architect pill
  document.getElementById('architect-pill').classList.remove('selected');
  // If card has a default agent, show it in terminal
  if (agentId) {
    const name = cardEl.getAttribute('data-default-name');
    const status = cardEl.getAttribute('data-default-status');
    selectAgent(agentId, name, status);
  } else {
    document.getElementById('term-dot').className = 'status-dot';
    document.getElementById('term-name').textContent = '—';
    document.getElementById('term-status').textContent = 'no agents';
    document.getElementById('term-body').innerHTML = '<span class="t-gray">No agent output for this napkin</span>';
  }
}

function selectAgent(id, name, status) {
  // Highlight architect pill if architect selected
  const pill = document.getElementById('architect-pill');
  if (id === 'architect') {
    pill.classList.add('selected');
    document.querySelectorAll('.kanban-card').forEach(c => c.classList.remove('selected'));
  } else {
    pill.classList.remove('selected');
  }

  // Update terminal header
  const dot = document.getElementById('term-dot');
  dot.className = 'status-dot dot-' + status;
  document.getElementById('term-name').textContent = name;
  document.getElementById('term-status').textContent = status;

  // Update terminal body
  document.getElementById('term-body').innerHTML = terminalContent[id] || '<span class="t-gray">No output</span>';
}

// Initialize terminal content
document.getElementById('term-body').innerHTML = terminalContent['001-fs-eng'];

</body>
</html>
